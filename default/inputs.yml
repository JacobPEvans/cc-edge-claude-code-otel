inputs:
  claude-code-session:
    disabled: false
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 10
    filenames:
      - "*.jsonl"
    filterArchivedFiles: false
    tailOnly: false
    idleTimeout: 300
    checkFileModTime: false
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: true
    type: file
    path: "$CLAUDE_HOME/.claude/projects"
    metadata:
      - name: datatype
        value: "'claude-code-session'"

  claude-code-history:
