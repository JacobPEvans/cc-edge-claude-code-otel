    disabled: false
    sendToRoutes: true
    pqEnabled: false
    streamtags:
      - vct
    host: 0.0.0.0
    port: 4317
    tls:
      disabled: true
    protocol: grpc
    extractSpans: false
    extractMetrics: false
    otlpVersion: 1.3.1
    authType: none
    maxActiveCxn: 1000
    extractLogs: false
    type: open_telemetry
    metadata:
      - name: datatype
        value: "'claude-code-otel'"
